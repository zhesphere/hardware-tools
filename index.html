<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>硬件工程师工具箱</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1 class="logo">🔧 硬件工程师工具箱</h1>
      <p class="subtitle">电阻 · 电容 · 电路计算 — 一站式硬件小工具集合</p>
    </div>
  </header>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-title">工具列表</div>
    <ul class="tool-nav" id="toolNav">
      <li><button class="tool-btn active" data-tool="capacitor">🔵 电容单位换算</button></li>
      <li><button class="tool-btn" data-tool="resistor">🟢 电阻单位换算</button></li>
      <li><button class="tool-btn" data-tool="color-code">🌈 电阻色环码计算</button></li>
      <li><button class="tool-btn" data-tool="ohms-law">⚡ 欧姆定律计算</button></li>
      <li><button class="tool-btn" data-tool="led">💡 LED限流电阻</button></li>
      <li><button class="tool-btn" data-tool="voltage-divider">🔻 分压计算器</button></li>
    </ul>
    <div class="sidebar-footer">
      <a href="https://github.com" target="_blank" class="github-link">📦 GitHub</a>
    </div>
  </nav>

  <main class="main-content" id="mainContent">
    <!-- 工具内容由 JS 动态加载 -->
  </main>

  <div class="overlay" id="overlay"></div>

  <footer class="footer">
    <p>硬件工程师工具箱 — 开源免费 · 持续更新中</p>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/tools/capacitor-converter.js"></script>
  <script src="js/tools/resistor-converter.js"></script>
  <script src="js/tools/resistor-color-code.js"></script>
  <script src="js/tools/ohms-law.js"></script>
  <script src="js/tools/led-resistor.js"></script>
  <script src="js/tools/voltage-divider.js"></script>
</body>
</html>
